name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - run: |
          BASE_VERSION=$(node -p "const v = require('./frontend/package.json').version.split('.'); [v[0], v[1]].join('.')")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "IMAGE_BACKEND=$(echo "ghcr.io/${{ github.repository_owner }}/testroadmap-backend" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "IMAGE_FRONTEND=$(echo "ghcr.io/${{ github.repository_owner }}/testroadmap-frontend" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV
          echo "APP_VERSION=${BASE_VERSION}.${{ github.run_number }}-${SHORT_SHA}" >> $GITHUB_ENV
          echo "SEMVER_VERSION=${BASE_VERSION}.${{ github.run_number }}" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ env.SHORT_SHA }}
            ${{ env.IMAGE_BACKEND }}:${{ env.SEMVER_VERSION }}

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_APP_VERSION=v${{ env.APP_VERSION }}
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ env.SHORT_SHA }}
            ${{ env.IMAGE_FRONTEND }}:${{ env.SEMVER_VERSION }}
