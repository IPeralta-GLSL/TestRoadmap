name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - run: |
          echo "IMAGE_BACKEND=ghcr.io/${{ github.repository_owner }}/testroadmap-backend" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV
          echo "IMAGE_FRONTEND=ghcr.io/${{ github.repository_owner }}/testroadmap-frontend" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:latest

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:latest
